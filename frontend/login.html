<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h2>Inventory Login</h2>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password">

    <br><br>

    <button onclick="login()">
        Login
    </button>
    <p>
    Don't have an account?
    <a href="signup.html">
        Signup
    </a>
</p>
    <p id="message"></p>

    <script src="login.js"></script>

</body>
</html>
